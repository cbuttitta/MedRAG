name: Build and Deploy

# Trigger this workflow on every push to the main branch
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code onto the runner
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Configure AWS credentials from GitHub Secrets
      # Add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to your repo's
      # Settings → Secrets and variables → Actions
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Step 3: Log Docker into your ECR registry
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # Step 4: Build and push the API image
      - name: Build and push API image
        run: |
          docker build -f Dockerfile.api -t medrag-api .
          docker tag medrag-api:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/medrag-api:latest
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/medrag-api:latest

      # Step 5: Build and push the frontend image
      - name: Build and push frontend image
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-arg VITE_API_KEY=${{ secrets.VITE_API_KEY }} \
            -t medrag-frontend .
          docker tag medrag-frontend:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/medrag-frontend:latest
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/medrag-frontend:latest

      # Step 6: Force ECS to pull the new images and restart containers
      - name: Redeploy ECS services
        run: |
          aws ecs update-service \
            --cluster Medrag-Cluster \
            --service medrag-api-service \
            --force-new-deployment
          aws ecs update-service \
            --cluster Medrag-Cluster \
            --service medrag-frontend-service \
            --force-new-deployment

